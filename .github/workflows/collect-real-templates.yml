name: Collect real PPTX templates

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'template_sources.json'
      - 'tools/collect_real_templates.py'
      - '.github/workflows/collect-real-templates.yml'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect real PPTX/POTX templates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/collect_real_templates.py

      - name: Commit collected templates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add templates template_sources.json
          if git diff --cached --quiet; then
            echo "No template changes to commit."
          else
            git commit -m "V17: collect real PPTX templates"
            git push
          fi
